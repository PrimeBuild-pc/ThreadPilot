sonar.projectKey=threadpilot
sonar.projectName=ThreadPilot
sonar.projectVersion=1.1.1

sonar.sourceEncoding=UTF-8
sonar.sources=.
sonar.tests=Tests

sonar.exclusions=**/bin/**,**/obj/**,**/artifacts/**,**/*.Designer.cs,**/*.g.cs,**/*.g.i.cs
sonar.test.inclusions=Tests/**/*.cs

# Coverage paths can be generated by dotnet test --collect:"XPlat Code Coverage"
sonar.cs.vscoveragexml.reportsPaths=**/TestResults/**/coverage.cobertura.xml
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
