name: Bug Report
description: Report a reproducible bug in ThreadPilot
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please include clear reproduction steps and environment details.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 1.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Windows Version
      options:
        - Windows 11
        - Windows 10 22H2+
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Step-by-step instructions to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and Diagnostics
      description: Include relevant app logs and stack traces
